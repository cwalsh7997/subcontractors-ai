<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Reset your Subcontractors.ai password">
    <title>Reset Password - Subcontractors.ai</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="stylesheet" href="app.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a3a52 0%, #2d5a7b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1f2937;
        }
        .auth-container { width: 100%; max-width: 520px; }
        .logo-container { text-align: center; margin-bottom: 40px; }
        .logo-container a { display: inline-block; text-decoration: none; }
        .logo-text {
            display: inline-block; font-size: 20px; font-weight: 700;
            color: white; margin-left: 8px; vertical-align: middle;
        }
        .auth-card {
            background: white; border-radius: 12px; padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.4s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .auth-heading { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: #1f2937; }
        .auth-subtext { font-size: 14px; color: #6b7280; margin-bottom: 32px; }
        .form-group { margin-bottom: 20px; }
        .form-label { display: block; font-size: 14px; font-weight: 500; color: #374151; margin-bottom: 8px; }
        .form-input {
            width: 100%; padding: 12px 14px; border: 1px solid #d1d5db;
            border-radius: 8px; font-family: inherit; font-size: 14px; transition: all 0.2s;
        }
        .form-input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1); }
        .form-input.error { border-color: #ef4444; }
        .error-message { font-size: 13px; color: #ef4444; margin-top: 6px; display: none; }
        .error-message.show { display: block; }
        .success-message {
            background-color: #d1fae5; color: #065f46; padding: 16px;
            border-radius: 8px; margin-bottom: 20px; font-size: 14px; display: none;
        }
        .success-message.show { display: block; }
        .auth-button {
            width: 100%; padding: 12px 24px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white; border: none; border-radius: 8px;
            font-size: 15px; font-weight: 600; cursor: pointer;
            transition: all 0.2s; font-family: inherit; margin-top: 8px;
        }
        .auth-button:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        .auth-button:disabled { opacity: 0.7; cursor: not-allowed; }
        .button-spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3); border-top-color: white;
            border-radius: 50%; animation: spin 0.6s linear infinite;
            margin-right: 8px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .auth-footer { text-align: center; font-size: 14px; color: #6b7280; margin-top: 24px; }
        .auth-footer a { color: #3b82f6; text-decoration: none; font-weight: 600; }
        .auth-footer a:hover { color: #1d4ed8; }
        .password-strength { margin-top: 8px; display: flex; gap: 4px; align-items: center; }
        .strength-bar { flex: 1; height: 4px; background-color: #e5e7eb; border-radius: 2px; overflow: hidden; }
        .strength-fill { height: 100%; width: 0%; background-color: #ef4444; transition: all 0.2s; }
        .strength-fill.medium { background-color: #f59e0b; width: 66.66%; }
        .strength-fill.strong { background-color: #10b981; width: 100%; }
        .strength-text { font-size: 12px; font-weight: 500; color: #6b7280; min-width: 50px; }
        .strength-text.weak { color: #ef4444; }
        .strength-text.medium { color: #f59e0b; }
        .strength-text.strong { color: #10b981; }
        @media (max-width: 480px) {
            .auth-card { padding: 32px 24px; }
            .auth-heading { font-size: 24px; }
        }
    </style>
<script defer src="/_vercel/insights/script.js"></script>
</head>
<body>
    <div class="auth-container">
        <div class="logo-container">
            <a href="../index.html">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="40" height="40" rx="8" fill="white"/>
                    <path d="M12 18C12 15.2386 14.2386 13 17 13H23C25.7614 13 28 15.2386 28 18V22C28 24.7614 25.7614 27 23 27H17C14.2386 27 12 24.7614 12 22V18Z" stroke="#1a3a52" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M16 20L19 23L24 17" stroke="#1a3a52" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="logo-text">Subcontractors.ai</span>
            </a>
        </div>

        <div class="auth-card">
            <h1 class="auth-heading">Set New Password</h1>
            <p class="auth-subtext">Choose a strong new password for your account</p>

            <div class="success-message" id="successMessage">
                Password updated successfully! Redirecting to sign in...
            </div>

            <div class="error-message show" id="tokenError" style="display:none; margin-bottom: 16px;">
                Invalid or expired reset link. Please <a href="login.html" style="color:#3b82f6;">request a new one</a>.
            </div>

            <form id="resetForm">
                <div class="form-group">
                    <label class="form-label" for="password">New Password</label>
                    <input type="password" id="password" name="password" class="form-input" placeholder="At least 8 characters" required>
                    <div class="password-strength">
                        <div class="strength-bar">
                            <div class="strength-fill" id="strengthFill"></div>
                        </div>
                        <span class="strength-text" id="strengthText"></span>
                    </div>
                    <div class="error-message" id="passwordError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="confirmPassword">Confirm New Password</label>
                    <input type="password" id="confirmPassword" name="confirmPassword" class="form-input" placeholder="Confirm your new password" required>
                    <div class="error-message" id="confirmPasswordError"></div>
                </div>

                <button type="submit" class="auth-button" id="resetButton">
                    <span class="button-spinner" id="buttonSpinner" style="display: none;"></span>
                    <span class="button-text">Update Password</span>
                </button>
            </form>

            <div class="auth-footer">
                <a href="login.html">Back to Sign In</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>

    <script>
        const resetForm = document.getElementById('resetForm');
        const passwordInput = document.getElementById('password');
        const confirmPasswordInput = document.getElementById('confirmPassword');
        const passwordError = document.getElementById('passwordError');
        const confirmPasswordError = document.getElementById('confirmPasswordError');
        const successMessage = document.getElementById('successMessage');
        const tokenError = document.getElementById('tokenError');
        const resetButton = document.getElementById('resetButton');
        const buttonSpinner = document.getElementById('buttonSpinner');
        const strengthFill = document.getElementById('strengthFill');
        const strengthText = document.getElementById('strengthText');

        // Initialize Supabase
        const supabaseUrl = window.SUPABASE_URL;
        const supabaseKey = window.SUPABASE_ANON_KEY || window.SUPABASE_KEY;
        let sbClient = null;

        if (supabaseUrl && supabaseKey && window.supabase && window.supabase.createClient) {
            sbClient = window.supabase.createClient(supabaseUrl, supabaseKey);
        }

        // Password strength checker
        function calculateStrength(password) {
            if (!password) return 0;
            let s = 0;
            if (password.length >= 8) s++;
            if (password.length >= 12) s++;
            if (/[A-Z]/.test(password)) s++;
            if (/[a-z]/.test(password)) s++;
            if (/[0-9]/.test(password)) s++;
            if (/[^A-Za-z0-9]/.test(password)) s++;
            return s;
        }

        passwordInput.addEventListener('input', () => {
            const strength = calculateStrength(passwordInput.value);
            strengthFill.className = 'strength-fill';
            strengthText.className = 'strength-text';
            if (strength === 0) {
                strengthText.textContent = '';
                strengthFill.style.width = '0%';
            } else if (strength <= 2) {
                strengthFill.style.width = '33.33%';
                strengthText.textContent = 'Weak';
                strengthText.classList.add('weak');
            } else if (strength <= 4) {
                strengthFill.classList.add('medium');
                strengthText.textContent = 'Medium';
                strengthText.classList.add('medium');
            } else {
                strengthFill.classList.add('strong');
                strengthText.textContent = 'Strong';
                strengthText.classList.add('strong');
            }
            passwordError.classList.remove('show');
            passwordInput.classList.remove('error');
        });

        confirmPasswordInput.addEventListener('input', () => {
            confirmPasswordError.classList.remove('show');
            confirmPasswordInput.classList.remove('error');
        });

        // Check for valid session from recovery link
        // Supabase redirects with #access_token=...&type=recovery in the hash
        async function checkRecoverySession() {
            if (!sbClient) {
                tokenError.style.display = 'block';
                resetForm.style.display = 'none';
                return;
            }

            // Give Supabase client time to pick up the hash tokens
            const { data: { session }, error } = await sbClient.auth.getSession();

            if (!session) {
                // No valid session — could be expired or invalid link
                // Check if there are hash params that suggest a recovery attempt
                const hash = window.location.hash;
                if (hash && hash.includes('error')) {
                    tokenError.style.display = 'block';
                    resetForm.style.display = 'none';
                } else if (!hash || !hash.includes('access_token')) {
                    tokenError.style.display = 'block';
                    resetForm.style.display = 'none';
                }
                // If hash has access_token, Supabase might still be processing — wait
            }
        }

        // Small delay to let Supabase process the hash
        setTimeout(checkRecoverySession, 500);

        // Handle form submit
        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Validate
            let valid = true;
            if (!passwordInput.value || passwordInput.value.length < 8) {
                passwordError.textContent = 'Password must be at least 8 characters';
                passwordError.classList.add('show');
                passwordInput.classList.add('error');
                valid = false;
            }
            if (passwordInput.value !== confirmPasswordInput.value) {
                confirmPasswordError.textContent = 'Passwords do not match';
                confirmPasswordError.classList.add('show');
                confirmPasswordInput.classList.add('error');
                valid = false;
            }
            if (!valid) return;

            resetButton.disabled = true;
            buttonSpinner.style.display = 'inline-block';

            try {
                const { data, error } = await sbClient.auth.updateUser({
                    password: passwordInput.value
                });

                if (error) {
                    passwordError.textContent = error.message;
                    passwordError.classList.add('show');
                    passwordInput.classList.add('error');
                } else {
                    resetForm.style.display = 'none';
                    successMessage.classList.add('show');
                    // Sign out so they log in fresh with new password
                    await sbClient.auth.signOut();
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 2000);
                }
            } catch (err) {
                passwordError.textContent = 'An error occurred. Please try again.';
                passwordError.classList.add('show');
                passwordInput.classList.add('error');
            } finally {
                resetButton.disabled = false;
                buttonSpinner.style.display = 'none';
            }
        });
    </script>
</body>
</html>
