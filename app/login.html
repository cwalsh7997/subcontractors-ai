<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Sign in to Subcontractors.ai - Connect with vetted subcontractors for your projects">
    <title>Sign In - Subcontractors.ai</title>
    <link rel="stylesheet" href="app.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a3a52 0%, #2d5a7b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: #1f2937;
        }

        .auth-container {
            width: 100%;
            max-width: 440px;
        }

        .logo-container {
            text-align: center;
            margin-bottom: 40px;
        }

        .logo-container a {
            display: inline-block;
            text-decoration: none;
        }

        .logo-container img {
            height: 40px;
            width: auto;
        }

        .logo-text {
            display: inline-block;
            font-size: 20px;
            font-weight: 700;
            color: white;
            margin-left: 8px;
            vertical-align: middle;
        }

        .demo-banner {
            background-color: #fbbf24;
            color: #78350f;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 24px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
            display: none;
        }

        .demo-banner.show {
            display: block;
        }

        .auth-card {
            background: white;
            border-radius: 12px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.4s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-heading {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #1f2937;
        }

        .auth-subtext {
            font-size: 14px;
            color: #6b7280;
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
        }

        .form-input:focus {
            outline: none;
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.1);
        }

        .form-input.error {
            border-color: #ef4444;
        }

        .form-input.error:focus {
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1);
        }

        .error-message {
            font-size: 13px;
            color: #ef4444;
            margin-top: 6px;
            display: none;
        }

        .error-message.show {
            display: block;
        }

        .form-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            font-size: 14px;
        }

        .forgot-link {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
            transition: color 0.2s;
        }

        .forgot-link:hover {
            color: #1d4ed8;
        }

        .auth-button {
            width: 100%;
            padding: 12px 24px;
            background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            font-family: inherit;
        }

        .auth-button:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3);
        }

        .auth-button:active:not(:disabled) {
            transform: translateY(0);
        }

        .auth-button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
        }

        .button-text {
            display: inline;
        }

        .button-spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: white;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .auth-divider {
            text-align: center;
            margin: 24px 0;
            font-size: 14px;
            color: #9ca3af;
        }

        .auth-footer {
            text-align: center;
            font-size: 14px;
            color: #6b7280;
        }

        .auth-footer a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 600;
            transition: color 0.2s;
        }

        .auth-footer a:hover {
            color: #1d4ed8;
        }

        .success-message {
            background-color: #d1fae5;
            color: #065f46;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 14px;
            display: none;
        }

        .success-message.show {
            display: block;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 32px 24px;
            }

            .auth-heading {
                font-size: 24px;
            }

            .logo-container {
                margin-bottom: 32px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo-container">
            <a href="../index.html">
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect width="40" height="40" rx="8" fill="white"/>
                    <path d="M12 18C12 15.2386 14.2386 13 17 13H23C25.7614 13 28 15.2386 28 18V22C28 24.7614 25.7614 27 23 27H17C14.2386 27 12 24.7614 12 22V18Z" stroke="#1a3a52" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                    <path d="M16 20L19 23L24 17" stroke="#1a3a52" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <span class="logo-text">Subcontractors.ai</span>
            </a>
        </div>

        <div class="demo-banner" id="demoBanner">
            Running in demo mode — any email/password will work
        </div>

        <div class="auth-card">
            <h1 class="auth-heading">Welcome Back</h1>
            <p class="auth-subtext">Sign in to your account to continue</p>

            <div class="success-message" id="successMessage">
                Login successful! Redirecting...
            </div>

            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email Address</label>
                    <input
                        type="email"
                        id="email"
                        name="email"
                        class="form-input"
                        placeholder="you@example.com"
                        required
                    >
                    <div class="error-message" id="emailError"></div>
                </div>

                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input
                        type="password"
                        id="password"
                        name="password"
                        class="form-input"
                        placeholder="Enter your password"
                        required
                    >
                    <div class="error-message" id="passwordError"></div>
                </div>

                <div class="form-actions">
                    <span></span>
                    <a href="#" class="forgot-link" id="forgotLink">Forgot password?</a>
                </div>

                <button type="submit" class="auth-button" id="loginButton">
                    <span class="button-spinner" id="buttonSpinner" style="display: none;"></span>
                    <span class="button-text">Sign In</span>
                </button>
            </form>

            <div class="auth-divider"></div>

            <div class="auth-footer">
                Don't have an account? <a href="signup.html">Sign up</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    <script src="app.js"></script>

    <script>
        const loginForm = document.getElementById('loginForm');
        const emailInput = document.getElementById('email');
        const passwordInput = document.getElementById('password');
        const loginButton = document.getElementById('loginButton');
        const buttonSpinner = document.getElementById('buttonSpinner');
        const buttonText = document.querySelector('.button-text');
        const emailError = document.getElementById('emailError');
        const passwordError = document.getElementById('passwordError');
        const successMessage = document.getElementById('successMessage');
        const demoBanner = document.getElementById('demoBanner');
        const forgotLink = document.getElementById('forgotLink');

        // Check if running in demo mode
        const supabaseUrl = window.SUPABASE_URL;
        const supabaseKey = window.SUPABASE_KEY;
        const isDemoMode = !supabaseUrl || !supabaseKey;

        if (isDemoMode) {
            demoBanner.classList.add('show');
        }

        // Prevent forgot password for now
        forgotLink.addEventListener('click', (e) => {
            e.preventDefault();
            alert('Password reset will be available soon. Please contact support.');
        });

        // Clear error messages on input
        emailInput.addEventListener('input', () => {
            emailError.classList.remove('show');
            emailError.textContent = '';
            emailInput.classList.remove('error');
        });

        passwordInput.addEventListener('input', () => {
            passwordError.classList.remove('show');
            passwordError.textContent = '';
            passwordInput.classList.remove('error');
        });

        // Form validation
        function validateForm() {
            let isValid = true;

            if (!emailInput.value.trim()) {
                emailError.textContent = 'Email is required';
                emailError.classList.add('show');
                emailInput.classList.add('error');
                isValid = false;
            } else if (!isValidEmail(emailInput.value)) {
                emailError.textContent = 'Please enter a valid email';
                emailError.classList.add('show');
                emailInput.classList.add('error');
                isValid = false;
            }

            if (!passwordInput.value.trim()) {
                passwordError.textContent = 'Password is required';
                passwordError.classList.add('show');
                passwordInput.classList.add('error');
                isValid = false;
            }

            return isValid;
        }

        function isValidEmail(email) {
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            return emailRegex.test(email);
        }

        // Handle login
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            // Clear previous errors
            emailError.classList.remove('show');
            passwordError.classList.remove('show');
            emailInput.classList.remove('error');
            passwordInput.classList.remove('error');

            // Validate form
            if (!validateForm()) {
                return;
            }

            // Disable button and show loading state
            loginButton.disabled = true;
            buttonSpinner.style.display = 'inline-block';

            try {
                if (isDemoMode) {
                    // Demo mode: store credentials in localStorage
                    const userData = {
                        id: 'demo-' + Date.now(),
                        email: emailInput.value,
                        name: emailInput.value.split('@')[0],
                        company_name: 'Demo Company',
                        trade: 'Other',
                        city: 'Demo City',
                        state: 'Demo',
                        created_at: new Date().toISOString(),
                        demo: true
                    };

                    localStorage.setItem('sb-demo-user', JSON.stringify(userData));
                    localStorage.setItem('sb-demo-session', JSON.stringify({
                        access_token: 'demo-token-' + Date.now(),
                        user: userData
                    }));

                    successMessage.classList.add('show');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);
                } else {
                    // Production mode: use Supabase
                    const { data, error } = await window.supabase.auth.signInWithPassword({
                        email: emailInput.value,
                        password: passwordInput.value
                    });

                    if (error) {
                        if (error.message.includes('Invalid login credentials')) {
                            emailError.textContent = 'Invalid email or password';
                            emailError.classList.add('show');
                            emailInput.classList.add('error');
                        } else {
                            emailError.textContent = error.message;
                            emailError.classList.add('show');
                            emailInput.classList.add('error');
                        }
                        return;
                    }

                    if (data && data.user) {
                        successMessage.classList.add('show');
                        setTimeout(() => {
                            window.location.href = 'dashboard.html';
                        }, 1000);
                    }
                }
            } catch (error) {
                emailError.textContent = 'An error occurred. Please try again.';
                emailError.classList.add('show');
                emailInput.classList.add('error');
            } finally {
                // Re-enable button and hide loading state
                loginButton.disabled = false;
                buttonSpinner.style.display = 'none';
            }
        });

        // Check if user is already logged in
        if (!isDemoMode && window.supabase) {
            window.supabase.auth.onAuthStateChange((event, session) => {
                if (session) {
                    window.location.href = 'dashboard.html';
                }
            });
        }
    </script>
</body>
</html>
